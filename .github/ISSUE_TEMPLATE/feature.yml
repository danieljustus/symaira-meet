name: Feature request
description: Propose a bounded, local-first product improvement.
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and compatibility considerations
