name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Guard — version matches tag
        run: |
          if [ "$GITHUB_REF_NAME" != "v${{ steps.version.outputs.VERSION }}" ]; then
            echo "ERROR: GITHUB_REF_NAME (${GITHUB_REF_NAME}) does not match v${VERSION}" >&2
            exit 1
          fi

      - name: Guard — required secrets present
        env:
          CHECK_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CHECK_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CHECK_ID: ${{ secrets.APPLE_ID }}
          CHECK_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          CHECK_APP_PASS: ${{ secrets.APPLE_APP_PASSWORD }}
          CHECK_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          MISSING=0
          for NAME in CHECK_CERT CHECK_PASS CHECK_ID CHECK_TEAM CHECK_APP_PASS CHECK_TAP_TOKEN; do
            eval "VAL=\$$NAME"
            if [ -z "$VAL" ]; then
              echo "ERROR: required secret ${NAME} is not set" >&2
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "All Apple signing secrets and the Homebrew tap token are required for signed beta releases." >&2
            exit 1
          fi

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$(mktemp -d)/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f /tmp/cert.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Export Apple credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "APPLE_ID=${APPLE_ID}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${APPLE_TEAM_ID}" >> "$GITHUB_ENV"
          echo "APPLE_APP_PASSWORD=${APPLE_APP_PASSWORD}" >> "$GITHUB_ENV"

      - name: Set commit timestamp for reproducibility
        run: |
          TAG_TS=$(git log -1 --format=%ct "$GITHUB_REF_NAME")
          echo "SOURCE_DATE_EPOCH=${TAG_TS}" >> "$GITHUB_ENV"

      - name: Install release tooling
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen

      - name: Build signed release
        run: scripts/build-release.sh "${{ steps.version.outputs.TAG }}"

      - name: Verify release artifacts
        run: |
          scripts/release-smoke.sh dist/ "${{ steps.version.outputs.VERSION }}"

      - name: Verify agent code signing
        run: |
          codesign --verify --deep --strict dist/SymMeetAgent.app
          spctl --assess --type execute --verbose dist/SymMeetAgent.app
          xcrun stapler validate dist/SymMeetAgent.app

      - name: Verify checksums
        run: cd dist && shasum -a 256 -c checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.dmg
            dist/sbom.spdx.json

      - name: Check existing prerelease
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: |
          if gh release view "$TAG" --repo danieljustus/symaira-meet >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create prerelease
        if: steps.release_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            dist/symmeet_*.tar.gz
            dist/SymMeetAgent_*.dmg
            dist/checksums.txt
            dist/sbom.spdx.json
            dist/*_notices.tar.gz

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.TAG }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          ASSET="symmeet_v${VERSION}_darwin_arm64.tar.gz"
          SHA=$(awk -v f="./${ASSET}" '$2 == f {print $1}' dist/checksums.txt)
          if [ -z "${SHA}" ]; then
            echo "ERROR: ${ASSET} not found in dist/checksums.txt" >&2
            exit 1
          fi
          APP_ASSET="SymMeetAgent_v${VERSION}.dmg"
          APP_SHA=$(awk -v f="./${APP_ASSET}" '$2 == f {print $1}' dist/checksums.txt)
          if [ -z "${APP_SHA}" ]; then
            echo "ERROR: ${APP_ASSET} not found in dist/checksums.txt" >&2
            exit 1
          fi
          gh repo clone danieljustus/tap tap-repo -- --depth 1
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p Casks
          sed -i '' \
            -e "s|^  url \".*\"|  url \"https://github.com/danieljustus/symaira-meet/releases/download/${TAG}/${ASSET}\"|" \
            -e "s|^  sha256 \"[0-9a-f]*\"|  sha256 \"${SHA}\"|" \
            Formula/symmeet.rb
          cat > Casks/symmeet-agent.rb <<EOF
          cask "symmeet-agent" do
            version "${VERSION}"
            sha256 "${APP_SHA}"

            url "https://github.com/danieljustus/symaira-meet/releases/download/${TAG}/${APP_ASSET}"
            name "SymMeetAgent"
            desc "Consent-first local meeting recording agent"
            homepage "https://github.com/danieljustus/symaira-meet"

            depends_on macos: :sequoia

            app "SymMeetAgent.app"

            zap trash: [
              "~/Library/Caches/dev.symaira.symmeet.agent",
              "~/Library/Preferences/dev.symaira.symmeet.agent.plist",
            ]
          end
          EOF
          git add Formula/symmeet.rb Casks/symmeet-agent.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula and cask already up to date."
            exit 0
          fi
          git commit -m "symmeet ${TAG}"
          gh auth setup-git
          git push

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: gh release edit "$TAG" --repo danieljustus/symaira-meet --draft=false --prerelease=true

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
