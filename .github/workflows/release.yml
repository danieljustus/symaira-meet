name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        run: |
          swift build -c release --product symmeet
          SYMMEET_VERSION="${{ steps.version.outputs.VERSION }}" \
          .build/release/symmeet version --json

      - name: Package CLI archive
        run: scripts/package-cli.sh "${{ steps.version.outputs.VERSION }}"

      - name: Build Agent app
        run: scripts/build-release.sh "${{ steps.version.outputs.VERSION }}"

      - name: Generate checksums
        run: scripts/generate-checksums.sh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            dist/symmeet_*.tar.gz
            dist/SymMeetAgent_*.dmg
            dist/checksums.txt

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ASSET="symmeet_${VERSION}_darwin_arm64.tar.gz"
          URL="https://github.com/danieljustus/symaira-meet/releases/download/${{ github.ref_name }}/${ASSET}"
          SHA256=$(awk -v asset="${ASSET}" '$0 ~ asset { print $1 }' dist/checksums.txt)

          if [ -z "${SHA256}" ]; then
            echo "Could not find checksum for ${ASSET}" >&2
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/danieljustus/tap.git" tap-repo
          cd tap-repo

          sed -i.bak -E "s|url \".*\"|url \"${URL}\"|" Formula/symmeet.rb
          sed -i.bak -E "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/symmeet.rb
          rm -f Formula/symmeet.rb.bak

          git add Formula/symmeet.rb
          git commit -m "symmeet ${VERSION}" || true
          git push
